spring:
  datasource:
    url: jdbc:h2:mem:edueval-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

app:
  jwt:
    secret: edueval-test-secret-key-minimum-256-bits-for-jwt-signing
    expiration-ms: 86400000
  ai-engine:
    base-url: http://localhost:8000
  file-storage:
    upload-dir: ./target/test-uploads
